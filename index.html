<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPulse - Kalorimeter & Kalkulator Nutrisi</title>
    <style>
        :root {
            --primary-dark: #0a192f;
            --primary-blue: #172a45;
            --light-blue: #3066be;
            --neon-blue: #00f2fe;
            --electric-cyan: #4facfe;
            --text-light: #f4f7f6;
            --text-gray: #a8b2d1;
            --glass-bg: rgba(23, 42, 69, 0.65);
            --glass-border: rgba(0, 242, 254, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--primary-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Live Animated Background Smooth Waves */
        .live-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #051329 0%, #0a192f 100%);
            overflow: hidden;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.08) 0%, transparent 60%);
            border-radius: 43%;
            animation: drift 25s infinite linear;
        }

        .wave:nth-child(2) {
            animation: drift 35s infinite linear;
            opacity: 0.5;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.08) 0%, transparent 70%);
        }

        .wave:nth-child(3) {
            animation: drift 45s infinite linear;
            opacity: 0.3;
            background: radial-gradient(circle, rgba(48, 102, 190, 0.1) 0%, transparent 50%);
        }

        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--neon-blue), var(--electric-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header p {
            color: var(--text-gray);
            font-size: 1.1rem;
        }

        /* Layout Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 900px) {
            .main-grid {
                grid-template-columns: 1.1fr 0.9fr;
            }
        }

        /* Glassmorphism Card Style */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.1);
        }

        .card h2 {
            font-size: 1.6rem;
            color: var(--neon-blue);
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(0, 242, 254, 0.1);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(10, 25, 47, 0.7);
            border: 1px solid rgba(168, 178, 209, 0.2);
            border-radius: 10px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--light-blue), var(--electric-cyan));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
            filter: brightness(1.1);
        }

        /* Results Display */
        .results-container {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .result-box {
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.15);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .result-box.active-target {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 254, 0.1);
        }

        .result-val {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon-blue);
            margin-top: 5px;
        }

        /* Tracker Section */
        .food-list-container {
            margin-top: 25px;
        }

        .food-list {
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .food-list::-webkit-scrollbar {
            width: 6px;
        }
        .food-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .food-list::-webkit-scrollbar-thumb {
            background: var(--light-blue);
            border-radius: 10px;
        }

        .food-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .food-info h4 {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 2px;
        }

        .food-info p {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff5b5b;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: none;
            padding: 5px;
            width: auto;
            margin: 0;
        }
        .delete-btn:hover {
            transform: scale(1.1);
            box-shadow: none;
            color: #ff3333;
        }

        /* Progress Bar / Summary Container */
        .progress-summary {
            background: rgba(10, 25, 47, 0.5);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(168, 178, 209, 0.1);
        }

        .progress-item {
            margin-bottom: 15px;
        }
        .progress-item:last-child {
            margin-bottom: 0;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .bar-outer {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--light-blue), var(--neon-blue));
            border-radius: 5px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>

    <!-- Live Ambient Background -->
    <div class="live-bg">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="container">
        <header>
            <h1>NutriPulse</h1>
            <p>Hitung presisi makro harian dan pantau transformasi tubuh idamanmu</p>
        </header>

        <div class="main-grid">
            <!-- Kiri: Kalkulator Kebutuhan -->
            <div class="card">
                <h2>📊 Kalkulator Nutrisi & Target</h2>
                <form id="calculatorForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="gender">Jenis Kelamin</label>
                            <select id="gender">
                                <option value="male">Laki-laki</option>
                                <option value="female">Perempuan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="age">Usia (Tahun)</label>
                            <input type="number" id="age" min="1" max="120" placeholder="Contoh: 17" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="weight">Berat Badan (kg)</label>
                            <input type="number" id="weight" min="10" placeholder="Sekarang" required>
                        </div>
                        <div class="form-group">
                            <label for="height">Tinggi Badan (cm)</label>
                            <input type="number" id="height" min="50" placeholder="Contoh: 170" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="activityLevel">Tingkat Aktivitas Fisik</label>
                        <select id="activityLevel">
                            <option value="1.2">Sedentari (Banyak duduk / jarang olahraga)</option>
                            <option value="1.375">Ringan (Olahraga ringan 1-3 hari/minggu)</option>
                            <option value="1.55">Sedang (Olahraga intensif 3-5 hari/minggu)</option>
                            <option value="1.725">Berat (Olahraga berat setiap hari 6-7 hari/minggu)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="goal">Target Kebugaran / Berat Badan</label>
                        <select id="goal">
                            <option value="maintain">Pertahankan Berat Badan</option>
                            <option value="lose">Cutting / Turunkan Berat Badan</option>
                            <option value="gain">Bulking / Naikkan Berat Badan (Bangun Otot)</option>
                        </select>
                    </div>

                    <button type="submit">Hitung Target Nutrisi</button>
                </form>

                <!-- Hasil Perhitungan -->
                <div id="results" class="results-container">
                    <h2>🎯 Target Harian Anda</h2>
                    <div class="result-grid">
                        <div class="result-box active-target">
                            <label>Target Kalori</label>
                            <div class="result-val"><span id="caloriesResult">0</span> <span style="font-size:0.9rem;color:var(--text-gray)">kcal</span></div>
                        </div>
                        <div class="result-box active-target">
                            <label>Target Protein</label>
                            <div class="result-val"><span id="proteinResult">0</span> <span style="font-size:0.9rem;color:var(--text-gray)">g</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Kanan: Tracker Makanan -->
            <div class="card">
                <h2>🍳 Log Tracker Makanan</h2>
                <form id="trackerForm">
                    <div class="form-group">
                        <label for="foodName">Nama Makanan / Minuman</label>
                        <input type="text" id="foodName" placeholder="Misal: Dada Ayam Panggang, Susu, Nasi" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="foodCalories">Kalori (kcal)</label>
                            <input type="number" id="foodCalories" min="0" placeholder="0" required>
                        </div>
                        <div class="form-group">
                            <label for="foodProtein">Protein (gram)</label>
                            <input type="number" id="foodProtein" min="0" placeholder="0" required>
                        </div>
                    </div>
                    <button type="submit" style="background: linear-gradient(135deg, #172a45, var(--light-blue)); border: 1px solid var(--neon-blue);">+ Tambah ke Log</button>
                </form>

                <div class="food-list-container">
                    <ul id="foodItems" class="food-list">
                        <!-- Item ditambahkan dinamis disini -->
                    </ul>

                    <!-- Progress Summary Bar -->
                    <div class="progress-summary">
                        <div class="progress-item">
                            <div class="progress-labels">
                                <span>Konsumsi Kalori</span>
                                <span><strong id="totalCalories">0</strong> / <span id="targetCalText">0</span> kcal</span>
                            </div>
                            <div class="bar-outer">
                                <div id="calBar" class="bar-inner"></div>
                            </div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-labels">
                                <span>Konsumsi Protein</span>
                                <span><strong id="totalProtein">0</strong> / <span id="targetProtText">0</span> g</span>
                            </div>
                            <div class="bar-outer">
                                <div id="proteinBar" class="bar-inner" style="background: linear-gradient(to right, var(--light-blue), #00f2fe)"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State management
        let targetCalories = 2000;
        let targetProtein = 60;
        let foodLogs = [];

        // DOM elements
        const calculatorForm = document.getElementById('calculatorForm');
        const resultsContainer = document.getElementById('results');
        const caloriesResult = document.getElementById('caloriesResult');
        const proteinResult = document.getElementById('proteinResult');
        const targetCalText = document.getElementById('targetCalText');
        const targetProtText = document.getElementById('targetProtText');

        const trackerForm = document.getElementById('trackerForm');
        const foodItems = document.getElementById('foodItems');
        const totalCaloriesText = document.getElementById('totalCalories');
        const totalProteinText = document.getElementById('totalProtein');
        const calBar = document.getElementById('calBar');
        const proteinBar = document.getElementById('proteinBar');

        // Set baseline text awal
        targetCalText.innerText = targetCalories;
        targetProtText.innerText = targetProtein;

        // Form Perhitungan Nutrisi
        calculatorForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const gender = document.getElementById('gender').value;
            const age = parseInt(document.getElementById('age').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const activityLevel = parseFloat(document.getElementById('activityLevel').value);
            const goal = document.getElementById('goal').value;

            // Rumus Mifflin-St Jeor
            let bmr;
            if (gender === 'male') {
                bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
            } else {
                bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
            }

            let tdee = bmr * activityLevel;

            // Penyesuaian Berdasarkan Target
            if (goal === 'lose') {
                targetCalories = Math.round(tdee - 500); // Defisit kalori aman
                targetProtein = Math.round(weight * 1.6); // Protein lebih tinggi saat cutting agar otot terjaga
            } else if (goal === 'gain') {
                targetCalories = Math.round(tdee + 400); // Surplus kalori bersih untuk clean bulking
                targetProtein = Math.round(weight * 2.0); // Optimal protein untuk hipertrofi otot
            } else {
                targetCalories = Math.round(tdee);
                targetProtein = Math.round(weight * 1.2);
            }

            // Minimal boundary aman kalori
            if(targetCalories < 1200) targetCalories = 1200;

            // Tampilkan hasil
            caloriesResult.innerText = targetCalories;
            proteinResult.innerText = targetProtein;
            targetCalText.innerText = targetCalories;
            targetProtText.innerText = targetProtein;

            resultsContainer.style.display = 'block';
            updateProgress();
        });

        // Form Tracker Tambah Makanan
        trackerForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const foodName = document.getElementById('foodName').value;
            const calories = parseInt(document.getElementById('foodCalories').value);
            const protein = parseInt(document.getElementById('foodProtein').value);

            const item = {
                id: Date.now(),
                name: foodName,
                calories: calories,
                protein: protein
            };

            foodLogs.push(item);
            renderFoodLogs();
            updateProgress();
            
            trackerForm.reset();
        });

        // Render list makanan
        function renderFoodLogs() {
            foodItems.innerHTML = '';
            
            if (foodLogs.length === 0) {
                foodItems.innerHTML = `<li style="color:var(--text-gray); font-size:0.9rem; text-align:center; padding:10px; background:none; border:none; display:block;">Belum ada makanan yang dicatat hari ini.</li>`;
                return;
            }

            foodLogs.forEach(log => {
                const li = document.createElement('li');
                li.className = 'food-item';
                li.innerHTML = `
                    <div class="food-info">
                        <h4>${log.name}</h4>
                        <p>🔥 ${log.calories} kcal  |  💪 ${log.protein}g Protein</p>
                    </div>
                    <button class="delete-btn" onclick="deleteLog(${log.id})">✕</button>
                `;
                foodItems.appendChild(li);
            });
        }

        // Hapus log makanan
        window.deleteLog = function(id) {
            foodLogs = foodLogs.filter(log => log.id !== id);
            renderFoodLogs();
            updateProgress();
        };

        // Update Kalkulasi Progress Bar & Total
        function updateProgress() {
            const totalCalories = foodLogs.reduce((sum, item) => sum + item.calories, 0);
            const totalProtein = foodLogs.reduce((sum, item) => sum + item.protein, 0);

            totalCaloriesText.innerText = totalCalories;
            totalProteinText.innerText = totalProtein;

            // Hitung persentase bar
            const calPercent = Math.min((totalCalories / targetCalories) * 100, 100);
            const protPercent = Math.min((totalProtein / targetProtein) * 100, 100);

            calBar.style.width = calPercent + '%';
            proteinBar.style.width = protPercent + '%';
            
            // Beri warna alarm jika over-kalori saat cutting (opsional styling)
            if(calPercent >= 100 && calculatorForm.goal?.value === 'lose') {
                calBar.style.background = '#ff5b5b';
            } else {
                calBar.style.background = 'linear-gradient(to right, var(--light-blue), var(--neon-blue))';
            }
        }

        // Inisialisasi awal list kosong
        renderFoodLogs();
    </script>
</body>
</html>
